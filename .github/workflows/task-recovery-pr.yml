name: Task Recovery PR

on:
  pull_request:
    types: [closed]

jobs:
  recover-tasks:
    # Only run if PR was closed without merging
    if: github.event.pull_request.merged == false
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create Recovery Branch
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git checkout -b recovery/pr-$PR_NUMBER

      - name: Run Recovery Script
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          node scripts/recover-rejected-tasks.mjs

      - name: Commit and Create PR
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          
          # Only commit if there are changes detected by the script
          if ! git diff --cached --quiet; then
            git commit -m "[RECOVERY] Restore tasks from closed PR #$PR_NUMBER"
            git push origin recovery/pr-$PR_NUMBER --force
            
            gh pr create \
              --title "[RECOVERY] Return tasks from closed PR #$PR_NUMBER to backlog" \
              --body "This PR was automatically generated because PR #${PR_NUMBER} was closed without being merged. It moves the associated tasks back to the \`todo\` bucket and releases their claims.\n\nOriginal PR: #${PR_NUMBER}\n\nReview and merge this recovery to restore the backlog state." \
              --base main \
              --head recovery/pr-$PR_NUMBER
          else
            echo "No tasks required recovery. Skipping PR creation."
          fi
